<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisy ui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome-cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css">

    <title>GitHub Issues Tracker</title>
</head>

<body class="bg-base-300">
    <!-- navebar section -->
    <nav class=" bg-base-100 shadow-sm">
        <div class="navbar w-11/12 m-auto">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <img class="w-10 h-10" src="assets/github-logo.png" alt="">
                    <a class="hidden sm:block text-xl">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary">New Issue</button>
            </div>
        </div>
    </nav>
    <section class="w-9/12 m-auto py-12 space-y-5">
        <!-- tab section -->
        <div class="flex gap-5 p-5 bg-white shadow-md rounded-md">
            <button id="allBtn" class="btn btn-primary" onclick="switchTab('allBtn')">All</button>
            <button id="openBtn" class="btn btn-outline btn-primary" onclick="switchTab('openBtn')">Open</button>
            <button id="closedBtn" class="btn btn-outline btn-primary" onclick="switchTab('closedBtn')">Closed</button>
        </div>


        <div class="bg-base-200 shadow-md">
            <!-- Issues Counter -->
            <div
                class="flex flex-col sm:flex-row gap-5 p-5 bg-white shadow-md rounded-md sm:justify-between sm:items-center">
                <div class="flex gap-3 items-center">
                    <img class="bg-purple-100 w-10 h-10 p-1 rounded-full" src="assets/Aperture.png" alt="">
                    <div class="">
                        <h3 class="font-bold text-lg"><span id="totalCounter">0</span> Issues</h3>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-3 text-sm">
                    <p class="flex items-center gap-1"><i id="openCircle" class="fa-solid fa-circle text-green-600"></i>
                        Open</p>
                    <p class="flex items-center gap-1"><i id="closedCircle"
                            class="fa-solid fa-circle text-purple-600"></i>
                        Cloded</p>
                </div>
            </div>
            <!-- Cards Container -->
            <div id="cardsContainer" class="p-10 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4  gap-5">

            </div>

            <!-- Modal section -->
            <!-- Open the modal using ID.showModal() method -->
            <dialog id="issueModal" class="modal">
                <div class="modal-box space-y-5">
                    <h3 id="ModalTitle" class="text-lg font-bold">Fix broken image uploads</h3>
                    <div class="flex gap-3 text-gray-400 items-center text-sm">
                        <div id="modalStatus" class="badge  text-white">Success</div>
                        <i  class="fa-solid fa-circle text-[5px]"></i>
                        <p>Opened by <span id="motalAssigni">Fahim Ahmed</span></p>
                        <i class="fa-solid fa-circle text-[5px]"></i>
                        <p id="mDate">22/02/2026</p>
                    </div>
                    <div id="modalLaverContainer" class="flex flex-wrap gap-2">
                        
                    </div>
                    <p id="mDicription" class="py-4 text-gray-500">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
                    <div class="flex bg-base-200 p-5 rounded-lg">
                        <div class="flex-1">
                            <p class="text-gray-500">Assignee:</p>
                            <p id="assigniName" class="font-semibold">Fahim Ahmed</p>
                        </div>
                        <div class="flex-1">
                            <p class="text-gray-500">Priority:</p>
                            <div id="mPriority" class="badge badge-error text-white">Error</div>
                        </div>
                    </div>
                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn btn-primary">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </div>
    </section>




    <script src="js/home.js"></script>
</body>

</html>
